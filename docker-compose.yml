services:
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${DOCKER_UID:-1000}
        APP_GID: ${DOCKER_GID:-1000}
    container_name: bitkub-streamlit
    working_dir: /app
    init: true
    command: >
      python -m streamlit run ui/streamlit/app.py
      --server.port=8501
      --server.address=0.0.0.0
    expose:
      - "8501"
    env_file:
      - ./.env
    environment:
      BITKUB_APP_ROOT: /app
      BITKUB_CONFIG_BASE_PATH: /app/config.base.json
      BITKUB_CONFIG_PATH: /app/runtime/config.json
      BITKUB_DB_PATH: /app/data/bitkub.db
      BITKUB_RUNTIME_STATE_PATH: /app/runtime/runtime_state.json
      BITKUB_SIGNAL_LOG_FILE: /app/runtime/signal_log.csv
      BITKUB_TRADE_LOG_FILE: /app/runtime/paper_trade_log.csv
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ./runtime:/app/runtime
      - ./data:/app/data
    restart: unless-stopped

  engine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_UID: ${DOCKER_UID:-1000}
        APP_GID: ${DOCKER_GID:-1000}
    container_name: bitkub-engine
    working_dir: /app
    init: true
    command: python main.py
    env_file:
      - ./.env
    environment:
      BITKUB_APP_ROOT: /app
      BITKUB_CONFIG_BASE_PATH: /app/config.base.json
      BITKUB_CONFIG_PATH: /app/runtime/config.json
      BITKUB_DB_PATH: /app/data/bitkub.db
      BITKUB_RUNTIME_STATE_PATH: /app/runtime/runtime_state.json
      BITKUB_SIGNAL_LOG_FILE: /app/runtime/signal_log.csv
      BITKUB_TRADE_LOG_FILE: /app/runtime/paper_trade_log.csv
    volumes:
      - ./runtime:/app/runtime
      - ./data:/app/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: bitkub-caddy
    depends_on:
      - streamlit
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
